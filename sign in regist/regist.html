<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>Register</title>
  <link rel="stylesheet" href="/Hero Page/Style.css"/>
  <link rel="stylesheet" href="regist.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/Database/db.js"></script>
</head>

  <body>
    <div claslogs="login-screen" id="registerScreen">
        <div class="login-card">
        <div class="login-logo">Paramuda.Id</div>
        <div class="login-sub">Buat Akun</div>
        <div class="login-form">
           <label>Nama Lengkap</label>
              <input type="text" id="regName" placeholder="Nama lengkap..." />

          <label>Email</label>
              <input type="email" id="regEmail" placeholder="email@contoh.com" />

              <label>Password</label>
                 <div class="pw-wrap">
        <input type="password" id="regPassword" placeholder="Min. 8 karakter..." />
        <button class="pw-toggle" onclick="togglePw('regPassword')">👁</button>
    </div>

      <label>Konfirmasi Password</label>
      <div class="pw-wrap">
        <input type="password" id="regConfirm" placeholder="Ulangi password..." />
        <button class="pw-toggle" onclick="togglePw('regConfirm')">👁</button>
      </div>

      <div class="login-error" id="regError"></div>
      <button class="btn-login" onclick="doRegister()">Daftar →</button>
        </div>
        <p class="login-hint">Sudah punya akun? <a href="sign in.html">Masuk</a></p>
        </div>
    </div>
  </body>
    <script src="Regist.js"></script>
</html>
